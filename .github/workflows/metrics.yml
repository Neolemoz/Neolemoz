name: Metrics

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Neolemoz
          template: classic
          base: header, activity
          config_timezone: Asia/Bangkok
